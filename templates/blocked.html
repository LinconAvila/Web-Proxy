<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Acesso Bloqueado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Cor de fundo destacada conforme exigido */
            background-color: #2c3e50; 
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #ffffff;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border-top: 8px solid #e74c3c; /* Destaque em vermelho para bloqueio */
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .proxy-name {
            font-size: 14px;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        h1 {
            color: #e74c3c;
            margin-bottom: 15px;
            font-size: 28px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #555;
            margin-bottom: 25px;
        }

        .domain-blocked {
            display: inline-block;
            background-color: #fce4e4;
            color: #c0392b;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 18px;
            word-break: break-all;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #aaa;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🔒</div>
        
        <div class="proxy-name">Web Proxy Server - SI2</div>
        
        <h1>Acesso Restrito</h1>
        
        <p>A política de segurança deste proxy impediu a navegação para o site solicitado, pois ele encontra-se na lista de restrições.</p>
        
        <div class="domain-blocked">
            {{ dominio }}
        </div>

        <div class="footer">
            Sistemas para Internet 2 &bull; Controle de Conteúdo
        </div>
    </div>

</body>
</html>
